# This workflow will create a JIRA issue upon creation of a GitHub issue

name: Create JIRA issue

permissions:
  contents: read
  issues: write

on:
  issues:
    types: [opened]

jobs:
  new_jira_issue:
    runs-on: ubuntu-latest

    steps:
      - name: JIRA Login
        uses: atlassian/gajira-login@v3.0.2
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Jira Create issue
        id: create_jira_issue
        uses: atlassian/gajira-create@v3.0.2
        with:
          project: GEOPY
          issuetype: Story
          summary: ${{ github.event.issue.title }}
          description: "_from [GitHub issue #${{ github.event.issue.number }}|${{ github.event.issue.html_url }}]_"

      - name: Post JIRA link
        uses: peter-evans/create-or-update-comment@v2.1.1
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "JIRA issue [${{ steps.create_jira_issue.outputs.issue }}] was created."
