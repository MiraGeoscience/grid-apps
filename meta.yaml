{% set name = "grid-apps" %}
{% set version = "0.1.0a1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../{{ name }}
 

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10.0,<3.11
    - poetry-core >=1.0.0
    - setuptools
    - pip
  run:
    - python >=3.10.0,<3.11
    - numpy >=1.26.0,<1.27.0
    - scipy >=1.14.0,<1.15.0
    - pandas >=1.5.3,<1.6.0
    - pydantic >=2.5.2,<3.0.0
    - discretize >=0.10.0,<0.11.0
    - geoh5py >=0.10.0a0.dev0, <0.11.0
    - geoapps-utils >=0.4.0a0.dev0,<0.5.0
    - h5py
    - pillow >=10.3.0,<10.4.0

test:
  imports:
    - grid_apps
  commands:
    - pip check
  requires:
    - pip

about:
  dev_url: https://github.com/MiraGeoscience/grid-apps

extra:
  recipe-maintainers:
    - SophieCurinier
    - sebhmg