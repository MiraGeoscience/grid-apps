schema_version: 1

context:
  name: "grid-apps"
  version: "0.0.0.dev0"  # This will be replaced by the actual version in the build process
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../${{ name }}

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - poetry-core >=1.8.0
    - poetry-dynamic-versioning >=1.9, <2.0.dev
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    # Mira packages
    - geoh5py >=0.12.0a3, <0.13.dev
    - geoapps-utils >=0.6.0a3,<0.7.dev
    # other direct dependencies
    - discretize >=0.11.0, <0.12.dev
    - numpy >=1.26.0, <1.27.dev
    - pydantic >=2.5.2, <3.0.dev
    - scipy >=1.14.0, <1.15.dev

tests:
  - python:
      imports:
        - grid_apps
  - script:
      - pytest --ignore=tests/version_test.py
    requirements:
      run:
        - pytest
    files:
      source:
        - tests/

about:
  repository: https://github.com/MiraGeoscience/grid-apps

extra:
  recipe-maintainers:
    - andrewg-mira
    - sebhmg
