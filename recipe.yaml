schema_version: 1

context:
  name: "grid-apps"
  version: "0.1.0a1"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../${{ name }}

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - poetry-core >=1.0.0
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    # Mira packages
    - geoh5py >=0.10.0a, <0.11.dev
    - geoapps-utils >=0.4.0a,<0.5.dev
    # direct dependencies
    - discretize >=0.10.0, <0.11.dev
    - numpy >=1.26.0, <1.27.dev
    - pandas >=2.2.1, <2.3.dev
    - pydantic >=2.5.2, <3.0.dev
    - scipy >=1.14.0, <1.15.dev

tests:
  - python:
      imports:
        - grid_apps
  - script:
      - pytest ./tests
    requirements:
      run:
        - pytest
    files:
      source:
        - tests/

about:
  repository: https://github.com/MiraGeoscience/grid-apps

extra:
  recipe-maintainers:
    - andrewg-mira
    - sebhmg
