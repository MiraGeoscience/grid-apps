schema_version: 1

context:
  name: "grid-apps"
  version: "0.0.0.dev0"  # This will be replaced by the actual version in the build process
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../${{ name }}

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - poetry-core >=1.8.0
    - poetry-dynamic-versioning >=1.9, <2.0.dev
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    # Mira packages
    - geoh5py >=0.12.0b5, 0.12.*
    - geoapps-utils >=0.6.0b2, 0.6.*
    # other direct dependencies
    - discretize 0.11.*
    - numpy 1.26.*
    - pydantic >=2.5.2, 2.*
    - scipy 1.14.*

tests:
  - python:
      imports:
        - grid_apps
  - script:
      - pytest --ignore=tests/version_test.py
    requirements:
      run:
        - pytest
    files:
      source:
        - tests/

about:
  summary: Grid creation and manipulation using GEOH5 format.
  description: |
    The grid-apps package offers tools for the creation and manipulation of grid objects
    (Octree, BlockModel, Grid2D, DrapeModel) using various Python libraries
    and `geoh5py <https://mirageoscience-geoh5py.readthedocs-hosted.com/>`_.
  license: MIT
  license_file:
    - LICENSE
    - docs/source/THIRD_PARTY_SOFTWARE.rst
  homepage: https://www.mirageoscience.com/mining-industry-software/python-integration/
  repository: https://github.com/MiraGeoscience/grid-apps

extra:
  recipe-maintainers:
    - andrewg-mira
    - sebhmg
