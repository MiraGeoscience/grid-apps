schema_version: 1

context:
  name: grid-apps
  version: 0.1.0a1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../${{ name }}

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10.0,<4.0.0
    - poetry-core >=1.0.0
    - setuptools
    - pip
  run:
    - python >=3.10.0,<3.11
    - numpy >=1.26.0,<1.27.0
    - scipy >=1.14.0,<1.15.0
    - pandas >=1.5.3,<1.6.0
    - pydantic >=2.5.2,<3.0.0
    - discretize >=0.10.0,<0.11.0
    - geoh5py >=0.10.0a.dev, <0.11.0
    - geoapps-utils >=0.4.0a.dev,<0.5.0a.dev
    - h5py
    - pillow >=10.3.0,<10.4.0

tests:
  - python:
      imports:
        - grid_apps
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  repository: https://github.com/MiraGeoscience/grid-apps

extra:
  recipe-maintainers:
    - SophieCurinier
    - sebhmg
